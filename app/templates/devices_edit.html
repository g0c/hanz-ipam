{% extends "base.html" %}
{% block content %}

<h3>Uredi uređaj #{{ dev.id }}</h3>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post">
  <div class="mb-3">
    <label class="form-label">Hostname</label>
    <input class="form-control" name="hostname" value="{{ dev.hostname }}">
  </div>

  <div class="mb-3">
    <label class="form-label">IP</label>
    <input class="form-control" name="ip_addr" value="{{ dev.ip_addr }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Status</label>
    <select class="form-select" name="status">
      <option value="active" {% if dev.status=='active' %}selected{% endif %}>active</option>
      <option value="offline" {% if dev.status=='offline' %}selected{% endif %}>offline</option>
      <option value="reserved" {% if dev.status=='reserved' %}selected{% endif %}>reserved</option>
      <option value="unknown" {% if dev.status=='unknown' %}selected{% endif %}>unknown</option>
    </select>
  </div>

  <button class="btn btn-primary">Spremi</button>
</form>

{% endblock %}
