{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-10">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="bi bi-pencil-square me-2 text-warning"></i>Uredi uređaj: {{ dev.hostname or dev.ip_addr }}</h4>
                <span class="badge bg-secondary">ID: {{ dev.id }}</span>
            </div>
            <div class="card-body p-4 bg-white">
                
                {% if error %}
                <div class="alert alert-danger border-start border-4 shadow-sm">
                    <i class="bi bi-exclamation-octagon me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post" id="editDeviceForm" novalidate>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold"><i class="bi bi-tag me-1 text-muted"></i>Hostname</label>
                            <input type="text" class="form-control" name="hostname" value="{{ dev.hostname or '' }}" placeholder="npr. srv-prod-01" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold"><i class="bi bi-broadcast me-1 text-muted"></i>IP adresa</label>
                            <input type="text" class="form-control font-monospace" id="ipInput" name="ip_addr" value="{{ dev.ip_addr }}" required>
                            <div id="ipScream" class="form-text mt-1"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold"><i class="bi bi-layers-half me-1 text-muted"></i>Mrežni segment (Subnet)</label>
                            <select class="form-select" name="subnet_id" id="subnetSelect">
                                <option value="">-- Odaberi subnet --</option>
                                {% for s in subnets %}
                                <option value="{{ s.id }}" {% if s.id == dev.subnet_id %}selected{% endif %}>
                                    {{ s.name or s.cidr }} ({{ s.cidr }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold"><i class="bi bi-router me-1 text-muted"></i>Tip uređaja</label>
                            <select class="form-select" name="device_type">
                                <option value="Server" {% if dev.device_type == 'Server' %}selected{% endif %}>Server</option>
                                <option value="Firewall" {% if dev.device_type == 'Firewall' %}selected{% endif %}>Vatrozid (Firewall)</option>
                                <option value="Switch" {% if dev.device_type == 'Switch' %}selected{% endif %}>Mrežni preklopnik (Switch)</option>
                                <option value="VM" {% if dev.device_type == 'VM' %}selected{% endif %}>Virtualna mašina (VM)</option>
                                <option value="Storage" {% if dev.device_type == 'Storage' %}selected{% endif %}>Spremište (Storage)</option>
                                <option value="Other" {% if dev.device_type == 'Other' %}selected{% endif %}>Ostalo</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold"><i class="bi bi-layers me-1 text-muted"></i>Okruženje</label>
                            <select class="form-select" name="environment">
                                <option value="PROD" {% if dev.environment == 'PROD' %}selected{% endif %}>Produkcija (PROD)</option>
                                <option value="TEST" {% if dev.environment == 'TEST' %}selected{% endif %}>Testiranje (TEST)</option>
                                <option value="DEV" {% if dev.environment == 'DEV' %}selected{% endif %}>Razvoj (DEV)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold"><i class="bi bi-activity me-1 text-muted"></i>Status</label>
                            <select class="form-select" name="status">
                                <option value="active" {% if dev.status.value == 'active' %}selected{% endif %}>Aktivan</option>
                                <option value="reserved" {% if dev.status.value == 'reserved' %}selected{% endif %}>Rezerviran</option>
                                <option value="offline" {% if dev.status.value == 'offline' %}selected{% endif %}>Isključen</option>
                                <option value="unknown" {% if dev.status.value == 'unknown' %}selected{% endif %}>Nepoznat</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold"><i class="bi bi-fingerprint me-1 text-muted"></i>MAC adresa</label>
                            <input type="text" class="form-control font-monospace" name="mac" value="{{ dev.mac or '' }}" placeholder="00:00:00:00:00:00">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold"><i class="bi bi-geo-alt me-1 text-muted"></i>Lokacija</label>
                            <input type="text" class="form-control" name="location" value="{{ dev.location or '' }}" placeholder="npr. Podatkovni centar 1, Kat 2">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold"><i class="bi bi-chat-left-text me-1 text-muted"></i>Komentar / Opis</label>
                        <textarea class="form-control" name="description" rows="3">{{ dev.description or '' }}</textarea>
                    </div>

                    <div class="alert alert-light border d-flex justify-content-between align-items-center mb-4 py-2">
                        <div class="small text-muted">
                            <i class="bi bi-person-plus me-1"></i> Autor: <strong>{{ dev.created_by or 'Sustav' }}</strong>
                        </div>
                        {% if dev.updated_by %}
                        <div class="small text-muted">
                            <i class="bi bi-pencil me-1"></i> Zadnja izmjena: <strong>{{ dev.updated_by }}</strong>
                        </div>
                        {% endif %}
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="/devices/{{ dev.id }}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-arrow-left me-1"></i>Natrag na detalje
                        </a>
                        <button type="submit" id="submitBtn" class="btn btn-success px-5 fw-bold shadow-sm">
                            <i class="bi bi-check2-circle me-2"></i>Spremi promjene
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ipaddr.js/2.1.0/ipaddr.min.js"></script>
<script>
$(document).ready(function() {
    const $ipInput = $('#ipInput');
    const $ipScream = $('#ipScream');
    const $submitBtn = $('#submitBtn');

    function checkIpScream() {
        const val = $ipInput.val().trim();
        if (!val) {
            $ipInput.removeClass('is-valid is-invalid');
            $submitBtn.prop('disabled', true);
            return;
        }

        if (!ipaddr.isValid(val)) {
            $ipInput.removeClass('is-valid').addClass('is-invalid');
            $ipScream.html('<span class="text-danger small fw-bold">Neispravan IP format!</span>');
            $submitBtn.prop('disabled', true);
            return;
        }

        const octet = val.split('.').pop();
        $submitBtn.prop('disabled', false);

        if (octet === '1') {
            $ipScream.html('<span class="text-warning fw-bold small">OPREZ: Vjerojatno Gateway!</span>');
            $ipInput.addClass('is-valid').removeClass('is-invalid');
        } else if (octet === '0' || octet === '255') {
            $ipScream.html('<span class="text-danger fw-bold small">KRITIČNO: Mrežna/Broadcast adresa!</span>');
            $ipInput.addClass('is-invalid').removeClass('is-valid');
            $submitBtn.prop('disabled', true);
        } else {
            $ipScream.html('<span class="text-success small fw-bold">IP adresa je ispravna.</span>');
            $ipInput.addClass('is-valid').removeClass('is-invalid');
        }
    }

    $ipInput.on('input', checkIpScream);
    if($ipInput.val()) checkIpScream();
});
</script>
{% endblock %}
