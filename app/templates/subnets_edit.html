{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3">
                <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Uredi podmrežu: {{ subnet.cidr }}</h4>
            </div>
            <div class="card-body p-4 bg-white">
                
                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Zatvori"></button>
                </div>
                {% endif %}

                <form method="post">
                    <div class="row mb-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Ime mreže</label>
                            <input type="text" class="form-control" name="name" value="{{ subnet.name or '' }}" placeholder="npr. Upravljanje serverima" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">VLAN ID</label>
                            <input type="number" class="form-control" name="vlan_id" value="{{ subnet.vlan_id or '' }}" placeholder="10">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">CIDR Notacija</label>
                        <input type="text" class="form-control font-monospace" name="cidr" value="{{ subnet.cidr }}" required>
                        <div class="form-text text-warning mt-2">
                            <i class="bi bi-exclamation-triangle me-1"></i> Promjena CIDR-a mijenja granice mreže i može utjecati na mapiranje postojećih uređaja!
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Opis / Napomena</label>
                        <textarea class="form-control" name="description" rows="3" placeholder="Dodatne informacije o segmentu...">{{ subnet.description or '' }}</textarea>
                    </div>

                    <hr class="text-muted mb-4">

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="/subnets" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-arrow-left me-2"></i>Odustani
                        </a>
                        <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">
                            <i class="bi bi-floppy me-2"></i>Spremi promjene
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
