<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Login" }} | IPAM</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  </head>
  <body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
      <div class="card shadow-sm" style="max-width:380px;width:100%;">
        <div class="card-body">
          <h5 class="card-title mb-4 text-center">Login to IPAM</h5>
          
          {% if error %}
          <div class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <div>
              {{ error }}
            </div>
          </div>
          {% endif %}

          <form method="post" action="/auth/login">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="username" required autofocus placeholder="AD Username">
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" required placeholder="••••••••">
            </div>
            <button class="btn btn-primary w-100 py-2" type="submit">Sign In</button>
          </form>
          
          <div class="mt-4 text-center text-muted small">
             &copy; DEVELOPED BY PIOPET 2026
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
