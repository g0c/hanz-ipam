<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Prijava" }} | IPAM</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
  </head>
  <body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
      <div class="card shadow-sm" style="max-width:380px;width:100%;">
        <div class="card-body">
          <h5 class="card-title mb-3 text-center">Prijava u IPAM</h5>
          <form method="post" action="/auth/login">
            <div class="mb-3">
              <label class="form-label">Korisničko ime</label>
              <input type="text" class="form-control" name="username" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Lozinka</label>
              <input type="password" class="form-control" name="password" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Prijava</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
