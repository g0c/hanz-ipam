<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL OPERATIONS CENTER *ONE*</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/style.css">
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-shield-shaded me-2"></i>GLOBAL OPERATIONS CENTER *ONE*
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if '/devices' in request.url.path %}active{% endif %}" href="/devices">
                        <i class="bi bi-cpu me-1"></i>Uređaji
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/subnets' in request.url.path %}active{% endif %}" href="/subnets">
                        <i class="bi bi-layers-half me-1"></i>Podmreže
                    </a>
                </li>
            </ul>
            
            <div class="d-flex align-items-center text-light small">
                <span class="me-3">Korisnik: <strong>{{ user.username }}</strong></span>
                <a href="/auth/logout" class="btn btn-outline-danger btn-sm">Izlaz</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    
    {% set flash_msg = get_flash(request) %}
    {% if flash_msg %}
    <div class="alert alert-success alert-dismissible fade show shadow-sm border-start border-4 border-success" role="alert">
        <i class="bi bi-check-circle-fill me-2 text-success"></i>{{ flash_msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Zatvori"></button>
    </div>
    {% endif %}
    
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/scripts/script.js"></script>

</body>
</html>
