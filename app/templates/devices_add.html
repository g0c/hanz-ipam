{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-10">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle me-2 text-primary"></i>Dodaj novi uređaj</h4>
            </div>
            <div class="card-body p-4 bg-white">
                
                {% if error %}
                <div class="alert alert-danger border-start border-4 shadow-sm">
                    <i class="bi bi-exclamation-octagon me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form action="/devices/add" method="post" id="addDeviceForm" novalidate>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Hostname</label>
                            <input type="text" class="form-control" name="hostname" 
                                   placeholder="npr. srv-prod-01" required>
                            <div class="invalid-feedback">Molimo unesite hostname.</div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">IP adresa</label>
                            <input type="text" class="form-control font-monospace" id="ipInput" name="ip_addr" 
                                   value="{{ prefilled_ip or '' }}" required>
                            <div id="ipScream" class="form-text mt-1"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Mrežni segment (Subnet)</label>
                            <select class="form-select" name="subnet_id">
                                <option value="">-- Odaberi subnet --</option>
                                {% for s in subnets %}
                                <option value="{{ s.id }}" {% if prefilled_subnet == s.id %}selected{% endif %}>
                                    {{ s.name or s.cidr }} ({{ s.cidr }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Tip uređaja</label>
                            <select class="form-select" name="device_type">
                                <option value="Server">Server</option>
                                <option value="Firewall">Vatrozid (Firewall)</option>
                                <option value="Switch">Mrežni preklopnik (Switch)</option>
                                <option value="VM" selected>Virtualna mašina (VM)</option>
                                <option value="Storage">Spremište (Storage)</option>
                                <option value="Other">Ostalo</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Okruženje</label>
                            <select class="form-select" name="environment">
                                <option value="PROD">Produkcija (PROD)</option>
                                <option value="TEST">Testiranje (TEST)</option>
                                <option value="DEV" selected>Razvoj (DEV)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Status</label>
                            <select class="form-select" name="status">
                                <option value="active" selected>Aktivan</option>
                                <option value="reserved">Rezerviran</option>
                                <option value="offline">Isključen</option>
                                <option value="unknown">Nepoznat</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">MAC adresa</label>
                            <input type="text" class="form-control font-monospace" name="mac" placeholder="00:00:00:00:00:00">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Lokacija</label>
                            <input type="text" class="form-control" name="location" placeholder="npr. Podatkovni centar 1, Rack A3">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Komentar / Opis</label>
                        <textarea class="form-control" name="description" rows="2"></textarea>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="/devices" class="btn btn-outline-secondary px-4">Odustani</a>
                        <button type="submit" id="submitBtn" class="btn btn-success px-5 fw-bold shadow-sm">
                            <i class="bi bi-save me-2"></i>Spremi uređaj
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ipaddr.js/2.1.0/ipaddr.min.js"></script>
<script>
$(document).ready(function() {
    const $ipInput = $('#ipInput');
    const $ipScream = $('#ipScream');
    const $submitBtn = $('#submitBtn');

    function checkIp() {
        const val = $ipInput.val().trim();
        if (!val) {
            $ipInput.removeClass('is-valid is-invalid');
            return;
        }

        if (ipaddr.isValid(val)) {
            $ipInput.addClass('is-valid').removeClass('is-invalid');
            $ipScream.html('<span class="text-success small fw-bold">IP adresa je ispravna.</span>');
            $submitBtn.prop('disabled', false);
        } else {
            $ipInput.addClass('is-invalid').removeClass('is-valid');
            $ipScream.html('<span class="text-danger small fw-bold">Neispravan IP format!</span>');
            $submitBtn.prop('disabled', true);
        }
    }

    $ipInput.on('input', checkIp);
    if($ipInput.val()) checkIp();
});
</script>
{% endblock %}
